<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Libro | Jugá en Grande</title>
  <meta name="description" id="page-desc" content="Comprá este libro en Jugá en Grande." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" type="image/svg+xml" href="assets/logo-mark.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/product.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="assets/logo-mark.svg" alt="" class="logo-mark" /><span class="logo-text">Jugá en <strong>Grande</strong></span></a>
      <div class="nav-actions" style="margin-left:auto">
        <a href="catalogo.html" class="nav-link">Catálogo</a>
        <a href="blog.html" class="nav-link">Blog</a>
        <button class="nav-icon-btn cart-btn" id="cart-btn" aria-label="Carrito">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" id="cart-count">0</span>
        </button>
      </div>
    </div>
  </nav>

  <div class="product-page">
    <!-- Breadcrumb -->
    <div class="breadcrumb container" id="breadcrumb">
      <a href="index.html">Inicio</a> <span>?</span>
      <a href="catalogo.html">Catálogo</a> <span>?</span>
      <span id="breadcrumb-cat"></span> <span>?</span>
      <span id="breadcrumb-title"></span>
    </div>

    <div class="product-container container" id="product-container">
      <!-- LOADING STATE -->
      <div class="product-loading" id="product-loading">
        <div class="skel-product-img"></div>
        <div class="skel-product-info">
          <div class="skel-line" style="width:30%;height:14px"></div>
          <div class="skel-line" style="width:80%;height:28px;margin-top:8px"></div>
          <div class="skel-line" style="width:50%;height:14px;margin-top:8px"></div>
          <div class="skel-line" style="width:40%;height:36px;margin-top:16px"></div>
          <div class="skel-line" style="width:100%;height:52px;margin-top:20px;border-radius:12px"></div>
        </div>
      </div>
    </div>

    <!-- Related books -->
    <section class="related-section section-padding" id="related-section" style="display:none">
      <div class="container">
        <div class="section-header-row">
          <div>
            <div class="section-label">x También te puede gustar</div>
            <h2 class="section-title">Clientes también <em>compraron</em></h2>
          </div>
        </div>
        <div class="books-carousel-wrapper">
          <div class="books-carousel" id="related-carousel"></div>
        </div>
      </div>
    </section>
  </div>

  <!-- Sticky CTA (mobile) -->
  <div class="sticky-cta" id="sticky-cta" style="display:none">
    <div class="sticky-cta-info">
      <span id="sticky-title"></span>
      <strong id="sticky-price"></strong>
    </div>
    <button class="btn btn-primary" id="sticky-add-btn">A?adir</button>
  </div>

  <!-- Cart Drawer -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header"><h3>Tu carrito</h3><button class="cart-close" id="cart-close">?</button></div>
    <div class="cart-drawer-items" id="cart-drawer-items">
      <div class="cart-empty" id="cart-empty"><div class="cart-empty-icon">JG</div><p>Tu carrito est? vac?o</p><a href="catalogo.html" class="btn btn-primary">Explorar libros</a></div>
    </div>
    <div class="cart-drawer-footer" id="cart-drawer-footer" style="display:none">
      <div class="cart-subtotal"><span>?</span><strong id="cart-subtotal-price">$0.00</strong></div>
      <div class="cart-free-shipping" id="cart-free-shipping"></div>
      <a href="carrito.html" class="btn btn-primary btn-full">Ver carrito y pagar</a>
    </div>
  </aside>
  <div class="toast" id="toast"><span id="toast-msg"></span></div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/product.js"></script>
  <script src="js/analytics.js"></script>
</body>
</html>
