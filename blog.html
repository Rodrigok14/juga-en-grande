<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog | Jugá en Grande</title>
  <meta name="description" content="Descubre listas, recomendaciones y guías de lectura. Top 10 libros de negocios, desarrollo personal, ficción y más." />
  <meta name="keywords" content="recomendaciones de libros, top libros, mejores libros 2026, lista de lectura" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/blog.css" />
</head>
<body>
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="index.html" class="logo"><img src="assets/logo-mark.svg" alt="" class="logo-mark" /><span class="logo-text">Jugá en <strong>Grande</strong></span></a>
      <div class="search-bar-nav">
        <input type="text" id="nav-search-input" placeholder="Buscar artículos..." autocomplete="off" />
        <button id="nav-search-btn" aria-label="Buscar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
      </div>
      <div class="nav-actions">
        <a href="catalogo.html" class="nav-link">Catálogo</a>
        <a href="blog.html" class="nav-link active">Blog</a>
        <button class="nav-icon-btn cart-btn" id="cart-btn" aria-label="Carrito">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
          <span class="cart-badge" id="cart-count">0</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- Blog Hero -->
  <section class="blog-hero">
    <div class="container">
      <div class="section-label">Nuestro blog</div>
      <h1 class="section-title">Ideas para <em>lectores curiosos</em></h1>
      <p class="section-subtitle">Listas, recomendaciones y guías para encontrar tu próxima lectura perfecta.</p>
    </div>
  </section>

  <!-- Category tabs -->
  <div class="blog-categories-bar">
    <div class="container">
      <div class="blog-cats" id="blog-cats">
        <button class="blog-cat-btn active" data-cat="">Todos</button>
        <button class="blog-cat-btn" data-cat="Negocios">Negocios</button>
        <button class="blog-cat-btn" data-cat="Desarrollo Personal">Desarrollo Personal</button>
        <button class="blog-cat-btn" data-cat="Hábitos">a Hábitos</button>
        <button class="blog-cat-btn" data-cat="Ficción">x" Ficción</button>
      </div>
    </div>
  </div>

  <!-- Featured post -->
  <section class="section-padding" id="featured-post-section">
    <div class="container">
      <div class="featured-post" id="featured-post"></div>
    </div>
  </section>

  <!-- All posts grid -->
  <section class="section-padding bg-subtle" id="all-posts-section">
    <div class="container">
      <div class="section-header-row">
        <div>
          <div class="section-label">xa Artículos</div>
          <h2 class="section-title">Todos los <em>artículos</em></h2>
        </div>
      </div>
      <div class="blog-posts-grid" id="blog-posts-grid"></div>
    </div>
  </section>

  <!-- Article view (single post) -->
  <article class="blog-article" id="blog-article" style="display:none">
    <div class="container">
      <button class="back-link" id="back-to-blog" style="margin-bottom:24px;cursor:pointer">Volver al blog</button>
      <div class="article-content" id="article-content"></div>
    </div>
  </article>

  <!-- Cart Drawer -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-drawer" id="cart-drawer">
    <div class="cart-drawer-header"><h3>Tu carrito</h3><button class="cart-close" id="cart-close" aria-label="Cerrar carrito">×</button></div>
    <div class="cart-drawer-items" id="cart-drawer-items">
      <div class="cart-empty" id="cart-empty"><div class="cart-empty-icon">JG</div><p>Tu carrito está vacío</p><a href="catalogo.html" class="btn btn-primary">Explorar libros</a></div>
    </div>
    <div class="cart-drawer-footer" id="cart-drawer-footer" style="display:none">
      <div class="cart-subtotal"><span>Subtotal</span><strong id="cart-subtotal-price">$0.00</strong></div>
      <div class="cart-free-shipping" id="cart-free-shipping"></div>
      <a href="carrito.html" class="btn btn-primary btn-full">Ver carrito</a>
    </div>
  </aside>
  <div class="toast" id="toast"><span id="toast-msg"></span></div>

  <script src="js/data.js"></script>
  <script src="js/cart.js"></script>
  <script src="js/blog.js"></script>
  <script src="js/analytics.js"></script>
</body>
</html>
